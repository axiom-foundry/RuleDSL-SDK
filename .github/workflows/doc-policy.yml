name: doc-policy

on:
  pull_request:

jobs:
  doc-policy:
    name: doc-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@v4

      - name: Non-goal claim lint (public surface)
        run: python Tools/doc_policy_lint/check_non_goal_claims.py --allow-missing

      - name: Lint self-test (precision + recall)
        run: python Tools/doc_policy_lint/test_non_goal_claims.py
