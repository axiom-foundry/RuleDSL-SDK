name: bundle-linux

# Builds the RuleDSL engine on Linux and assembles a complete SDK delivery
# bundle whose bin/ directory is populated with the Linux binaries:
#   bin/ruledslc            (CLI compiler executable, ELF)
#   bin/libruledsl_capi.so  (engine shared library, ELF)
#
# The engine SOURCE lives in the private repo axiom-foundry/RuleDSL; the SDK
# repo only ships headers/docs/examples/bindings + the bundle tooling. This
# workflow therefore checks out the private engine repo (needs a token),
# builds it with the same Release+Ninja path that the engine CI runs green,
# then reuses the existing Tools/release_bundle/build_bundle.ps1 to produce a
# deterministic bundle and audits it with audit_bundle_layout.ps1.
#
# REQUIRED SECRET:
#   ENGINE_REPO_TOKEN  - a PAT (classic: `repo` scope, or fine-grained:
#                        Contents=read on axiom-foundry/RuleDSL) so this public
#                        repo can check out the private engine source.
#                        Set it in: Settings > Secrets and variables > Actions.

on:
  workflow_dispatch:
    inputs:
      engine_ref:
        description: "Engine repo ref (branch/tag/SHA) to build"
        required: false
        default: "main"
      bundle_type:
        description: "Bundle type"
        required: false
        default: "Evaluation"
        type: choice
        options:
          - Evaluation
          - Commercial
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux-bundle:
    name: linux-bundle
    runs-on: ubuntu-24.04
    env:
      ENGINE_REPO: axiom-foundry/RuleDSL
    steps:
      - name: Checkout SDK (public)
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout engine (private source)
        uses: actions/checkout@v4
        with:
          repository: axiom-foundry/RuleDSL
          ref: ${{ github.event.inputs.engine_ref || 'main' }}
          token: ${{ secrets.ENGINE_REPO_TOKEN }}
          path: engine

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure engine (Release)
        # The engine is PRIVATE source built inside this PUBLIC repo's CI.
        # Redirect cmake output so the public log never enumerates engine
        # source paths; surface only a short tail on failure for debugging.
        run: |
          set -euo pipefail
          if ! cmake -S engine -B engine/build -G Ninja -DCMAKE_BUILD_TYPE=Release > engine/configure.log 2>&1; then
            echo "::error::engine configure failed"
            tail -n 50 engine/configure.log
            exit 1
          fi
          echo "engine configured (Release)"

      - name: Build ruledslc + shared C API
        # Ninja prints per-file source names; redirect so the public log does
        # not list private engine source files. On failure, surface only the
        # compiler error lines (not the full file-by-file progress).
        run: |
          set -euo pipefail
          if ! cmake --build engine/build --parallel --target ruledslc axiom_ruledsl_c_shared > engine/build.log 2>&1; then
            echo "::error::engine build failed (showing error lines only)"
            grep -iE "error[:0-9 ]" engine/build.log | tail -n 40 || true
            exit 1
          fi
          echo "engine build OK ($(grep -c 'Building CXX object' engine/build.log || true) objects compiled)"

      - name: Locate built binaries
        id: bins
        run: |
          set -euo pipefail
          ENGINE_BIN="$(find "$GITHUB_WORKSPACE/engine/build" -name 'libruledsl_capi.so' -type f | head -n1)"
          COMPILER_BIN="$(find "$GITHUB_WORKSPACE/engine/build" -name 'ruledslc' -type f | head -n1)"
          if [ -z "$ENGINE_BIN" ] || [ -z "$COMPILER_BIN" ]; then
            echo "::error::Could not locate built binaries (engine='$ENGINE_BIN' compiler='$COMPILER_BIN')"
            find "$GITHUB_WORKSPACE/engine/build" -maxdepth 2 -type f \( -name '*.so' -o -name 'ruledslc' \) | sed 's/^/  found: /'
            exit 1
          fi
          chmod +x "$COMPILER_BIN"
          echo "engine_bin=$ENGINE_BIN" >> "$GITHUB_OUTPUT"
          echo "compiler_bin=$COMPILER_BIN" >> "$GITHUB_OUTPUT"

      - name: Smoke test Linux binaries
        run: |
          set -euo pipefail
          C="${{ steps.bins.outputs.compiler_bin }}"
          SO="${{ steps.bins.outputs.engine_bin }}"

          echo "== file type =="
          file "$SO" "$C"
          file "$SO" | grep -q "ELF" || { echo "::error::engine library is not an ELF object"; exit 1; }

          echo "== ruledslc --version =="
          "$C" --version

          echo "== end-to-end compile + verify (non-fatal) =="
          RULE="$GITHUB_WORKSPACE/sdk/examples/01_risk_scoring/rules.rule"
          if   "$C" compile "$RULE" -o /tmp/smoke.axbc --lang 1.0 --target axbc3; then :;
          elif "$C" compile "$RULE" -o /tmp/smoke.axbc --lang 0.9 --target axbc3; then :;
          else echo "WARN: sample compile failed (non-fatal smoke step)"; fi
          if [ -f /tmp/smoke.axbc ]; then "$C" verify /tmp/smoke.axbc || echo "WARN: verify failed (non-fatal)"; fi

      - name: Assemble SDK bundle (bin/ populated)
        shell: pwsh
        working-directory: sdk
        run: |
          ./Tools/release_bundle/build_bundle.ps1 `
            -EngineBin   "${{ steps.bins.outputs.engine_bin }}" `
            -CompilerBin "${{ steps.bins.outputs.compiler_bin }}" `
            -BundleType  "${{ github.event.inputs.bundle_type || 'Evaluation' }}" `
            -Out         "$env:GITHUB_WORKSPACE/dist/bundle"

      - name: Audit bundle layout
        shell: pwsh
        working-directory: sdk
        run: ./Tools/release_bundle/audit_bundle_layout.ps1 -BundleDir "$env:GITHUB_WORKSPACE/dist/bundle"

      - name: Clean-room — verify the SHIPPED bundle (every documented onboarding path)
        # Fresh scratch copy of the REAL bundle; exercise every documented onboarding
        # path against the SHIPPED binaries (not the CI build): the 5 example folders,
        # the quickstart loop, the examples/c set, and the replay produce->verify loop.
        # This is the per-build proof that the shipped bundle is self-sufficient.
        run: |
          set -euo pipefail
          B=/tmp/bundle-smoke
          rm -rf "$B"; cp -a "$GITHUB_WORKSPACE/dist/bundle" "$B"
          chmod +x "$B/bin/ruledslc"
          export LD_LIBRARY_PATH="$B/bin"
          fail=0

          # 1) Example folders 01..05: compile rule + build main.c + diff expected_output.
          for d in "$B"/examples/0*/; do
            name=$(basename "$d")
            (
              cd "$d"
              "$B/bin/ruledslc" compile rules.rule -o rules.axbc --lang 0.9 --target axbc3
              "$B/bin/ruledslc" verify rules.axbc
              cc main.c -I "$B/include" -L "$B/bin" -lruledsl_capi -o eval
              got=$(./eval rules.axbc)
              exp=$(cat expected_output.txt)
              if [ "$got" != "$exp" ]; then
                echo "::error::example '$name' output mismatch"
                printf 'got:\n%s\nexpected:\n%s\n' "$got" "$exp"; exit 1
              fi
              echo "OK    example $name"
            ) || fail=1
          done

          # 2) Quickstart loop: the documented examples/c/minimal_eval.c path.
          (
            cd "$B"
            ./bin/ruledslc compile examples/01_risk_scoring/rules.rule -o /tmp/qs.axbc --lang 0.9 --target axbc3
            cc examples/c/minimal_eval.c -I include -L bin -lruledsl_capi -o /tmp/minimal_eval
            got=$(/tmp/minimal_eval /tmp/qs.axbc)
            exp=$'RuleDSL/1.0.0 (abi=1)\nDecision: matched=1 action_type=0\nDETERMINISTIC_OK'
            if [ "$got" != "$exp" ]; then
              echo "::error::quickstart loop mismatch"; printf 'got:\n%s\nexpected:\n%s\n' "$got" "$exp"; exit 1
            fi
            echo "OK    quickstart loop"
          ) || fail=1

          # 3) examples/c smoke: compile + run each against the shipped binaries.
          (
            cd "$B"
            ./bin/ruledslc compile examples/05_velocity_limit/rules.rule -o /tmp/of.axbc --lang 0.9 --target axbc3
            for f in batch_eval error_handling output_fields unknown_error_code malformed_bytecode; do
              cc examples/c/$f.c -I include -L bin -lruledsl_capi -o /tmp/$f
              if [ "$f" = "output_fields" ]; then arg=/tmp/of.axbc; else arg=""; fi
              /tmp/$f $arg >/dev/null
              echo "OK    examples/c/$f.c"
            done
          ) || fail=1

          # 4) Replay produce->verify using the bundled tooling against the shipped .so.
          (
            cd "$B"
            python3 bindings/python/examples/replay_proof_producer.py "$B/bin/libruledsl_capi.so" /tmp/rp
            python3 Tools/replay_proof/verify_replay_proof.py --a /tmp/rp/run_a.json --b /tmp/rp/run_b.json
            echo "OK    replay produce->verify"
          ) || fail=1

          [ "$fail" -eq 0 ] || { echo "::error::shipped bundle clean-room failed (a documented path is not self-sufficient)"; exit 1; }

      - name: Package bundle (deterministic archives)
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-manual}"
          PREFIX="RuleDSL-SDK-${TAG}-linux-x86_64"
          mkdir -p "$GITHUB_WORKSPACE/out"

          # Stage under a prefixed directory so archives extract cleanly.
          STAGE="$GITHUB_WORKSPACE/out/${PREFIX}"
          mkdir -p "$STAGE"
          cp -a "$GITHUB_WORKSPACE/dist/bundle/." "$STAGE/"

          # Normalize mtimes so the zip is reproducible (zip embeds file times;
          # tar below pins its own mtime). 1980-01-01 is the zip epoch minimum.
          find "$STAGE" -exec touch -t 198001010000 {} +

          # Deterministic tar.gz: sorted entries, fixed mtime/owner, no gzip timestamp.
          tar --sort=name --mtime='UTC 1980-01-01' --owner=0 --group=0 --numeric-owner \
              -C "$GITHUB_WORKSPACE/out" -cf "$GITHUB_WORKSPACE/out/${PREFIX}.tar" "${PREFIX}"
          gzip -n -9 -c "$GITHUB_WORKSPACE/out/${PREFIX}.tar" > "$GITHUB_WORKSPACE/out/${PREFIX}.tar.gz"
          rm -f "$GITHUB_WORKSPACE/out/${PREFIX}.tar"

          # Deterministic zip.
          ( cd "$GITHUB_WORKSPACE/out" && find "${PREFIX}" -type f | sort | \
            zip -X -9 "${PREFIX}.zip" -@ >/dev/null )

          ( cd "$GITHUB_WORKSPACE/out" && sha256sum "${PREFIX}.tar.gz" "${PREFIX}.zip" > SHA256SUMS.txt )
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.prefix }}
          path: |
            out/${{ steps.pkg.outputs.prefix }}.tar.gz
            out/${{ steps.pkg.outputs.prefix }}.zip
            out/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish to GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ steps.pkg.outputs.prefix }}.tar.gz
            out/${{ steps.pkg.outputs.prefix }}.zip
            out/SHA256SUMS.txt
          fail_on_unmatched_files: true
